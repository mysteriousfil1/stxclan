<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#1 [ STX ] | Admin Panel REBORN</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <style>
        :root { --primary: #ffbb00; --secondary: #ff4d4d; --bg: #000000; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        .admin-page { min-height: 100vh; background: radial-gradient(circle at top right, #111 0%, #000 70%); }
        .admin-glow { position: fixed; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,187,0,0.1) 0%, transparent 70%); pointer-events: none; transform: translate(-50%, -50%); z-index: 9999; }
        .navbar { position: fixed; top: 0; width: 100%; height: 80px; display: flex; align-items: center; border-bottom: 1px solid #222; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000; }
        .container { max-width: 1200px; margin: 0 auto; width: 90%; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .glow-text { color: var(--primary); text-shadow: 0 0 10px var(--primary); margin: 0; }
        .admin-main { padding-top: 150px; padding-bottom: 50px; }
        /* Login UI */
        .login-card { max-width: 400px; margin: 100px auto; background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; opacity: 0.8; }
        .form-group input { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 12px 30px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        .btn-primary { background: var(--primary); color: #000; width: 100%; transition: 0.3s; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,187,0,0.3); }
        /* Dashboard UI */
        .admin-box { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; padding: 30px; margin-bottom: 30px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-item { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .stat-item h3 { margin: 0; opacity: 0.6; font-size: 0.9rem; }
        .stat-item p { margin: 10px 0 0; font-size: 2rem; font-weight: 900; color: var(--primary); }
        .player-table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: right; }
        .player-table th { padding: 15px; border-bottom: 2px solid #222; color: var(--primary); }
        .player-table td { padding: 15px; border-bottom: 1px solid #111; }
        .mini-avatar { width: 35px; height: 35px; border-radius: 50%; vertical-align: middle; margin-left: 10px; border: 1px solid var(--primary); }
        .admin-select { background: #111; color: white; border: 1px solid #333; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body class="admin-page">
    <div class="admin-glow" id="mouse-glow"></div>
    
    <nav class="navbar">
        <div class="container nav-content">
            <h1 class="glow-text">STEEL X ADMIN</h1>
            <a href="index.html" style="color: white; text-decoration: none;">العودة للموقع</a>
        </div>
    </nav>

    <main class="container admin-main">
        <!-- Login Section -->
        <div id="login-section">
            <div class="login-card">
                <h2>دخول الإدارة</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>المستخدم</label>
                        <input type="text" id="user" required>
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" id="pass" required>
                    </div>
                    <button type="submit" class="btn btn-primary">دخول</button>
                    <p id="error" style="color: var(--secondary); display: none; margin-top: 15px;">خطأ في البيانات!</p>
                </form>
            </div>
        </div>

        <!-- Panel Section -->
        <div id="panel-section" style="display: none;">
            <div class="stats-row">
                <div class="stat-item">
                    <h3>إجمالي المستخدمين</h3>
                    <p id="count-users">0</p>
                </div>
                <div class="stat-item">
                    <h3>أعضاء VIP</h3>
                    <p id="count-vips">0</p>
                </div>
                <div class="stat-item">
                    <h3>الحالة</h3>
                    <p style="color: #00ff00;">متصل</p>
                </div>
            </div>

            <div class="admin-box">
                <h2>إدارة اللاعبين</h2>
                <div style="overflow-x: auto;">
                    <table class="player-table">
                        <thead>
                            <tr>
                                <th>اللاعب</th>
                                <th>الباقة</th>
                                <th>تاريخ الانتهاء</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="players-list">
                            <!-- JS will populate -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Smooth Mouse Glow
        const glow = document.getElementById('mouse-glow');
        document.addEventListener('mousemove', (e) => {
            gsap.to(glow, { left: e.clientX, top: e.clientY, duration: 0.1 });
        });

        // Admin Auth
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('user').value,
                    password: document.getElementById('pass').value
                })
            });
            if (res.ok) loadPanel();
            else document.getElementById('error').style.display = 'block';
        });

        async function checkStatus() {
            const res = await fetch('/api/admin/status');
            if (res.ok) loadPanel();
        }

        async function loadPanel() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('panel-section').style.display = 'block';
            
            // Fetch Stats
            const statsRes = await fetch('/api/admin/stats');
            const stats = await statsRes.json();
            document.getElementById('count-users').innerText = stats.totalPlayers;
            document.getElementById('count-vips').innerText = stats.activeVIPs;

            // Fetch Players
            const playersRes = await fetch('/api/admin/players');
            const players = await playersRes.json();
            const list = document.getElementById('players-list');
            list.innerHTML = '';
            players.forEach(p => {
                const row = `
                    <tr>
                        <td>
                            <img src="${p.avatar ? 'https://cdn.discordapp.com/avatars/'+p.discord_id+'/'+p.avatar+'.png' : 'https://cdn.discordapp.com/embed/avatars/0.png'}" class="mini-avatar">
                            ${p.username}
                        </td>
                        <td>
                            <select onchange="updateVIP('${p.discord_id}', this.value)" class="admin-select">
                                <option value="Member" ${p.subscriptionPackage === 'Member' ? 'selected' : ''}>Member</option>
                                <option value="🏆 𝐕𝐈𝐏 𝐖𝐡𝐢𝐭𝐞𝐥𝐢𝐬𝐭 Platinum" ${p.subscriptionPackage.includes('Platinum') ? 'selected' : ''}>Platinum</option>
                                <option value="🏆 𝐕𝐈𝐏 𝐖𝐡𝐢𝐭𝐞𝐥𝐢𝐬𝐭 Golden" ${p.subscriptionPackage.includes('Golden') ? 'selected' : ''}>Golden</option>
                                <option value="🥈 𝐒𝐢𝐥𝐯𝐞𝐫 𝐃𝐨𝐧𝐞𝐭𝐞𝐫" ${p.subscriptionPackage.includes('Silver') ? 'selected' : ''}>Silver</option>
                            </select>
                        </td>
                        <td>${p.subscriptionExpiry ? new Date(p.subscriptionExpiry).toLocaleDateString() : 'دائم'}</td>
                        <td>
                            <button onclick="setExpiry('${p.discord_id}')" style="background: #222; color: white; border: 1px solid #444; padding: 5px; cursor: pointer;">تعديل المدة</button>
                        </td>
                    </tr>
                `;
                list.insertAdjacentHTML('beforeend', row);
            });
        }

        async function updateVIP(id, pkg) {
            await fetch('/api/admin/update-player', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ discord_id: id, subscriptionPackage: pkg })
            });
            loadPanel();
        }

        async function setExpiry(id) {
            const days = prompt('ادخل عدد الأيام للإضافة:');
            if (days) {
                const expiry = new Date();
                expiry.setDate(expiry.getDate() + parseInt(days));
                await fetch('/api/admin/update-player', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ discord_id: id, subscriptionExpiry: expiry.toISOString() })
                });
                loadPanel();
            }
        }

        checkStatus();
    </script>
</body>
</html>
